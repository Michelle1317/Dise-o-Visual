<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" width="460" height="380" role="img" aria-label="Persona interactuando con una interfaz digital">
  <defs>
    <style>
      .ln{ fill:none; stroke:#6C4DD3; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; }
      .fill{ fill:#6C4DD3; }
      .soft{ fill:#E9E6FA; }
      .soft2{ fill:#F1EEFF; }
    </style>
  </defs>

  <ellipse cx="230" cy="350" rx="170" ry="16" class="soft"/>

  <!-- Pantalla -->
  <rect x="86" y="40" width="288" height="208" rx="16" class="soft2"/>
  <rect x="86" y="40" width="288" height="208" rx="16" class="ln"/>
  <line x1="86" y1="76" x2="374" y2="76" class="ln"/>
  <circle cx="106" cy="58" r="4.5" class="fill"/>
  <circle cx="124" cy="58" r="4.5" class="soft"/>
  <circle cx="142" cy="58" r="4.5" class="soft"/>

  <!-- Bloque imagen -->
  <rect x="110" y="98" width="120" height="120" rx="10" class="soft"/>
  <rect x="110" y="98" width="120" height="120" rx="10" class="ln"/>
  <circle cx="170" cy="146" r="22" class="ln"/>
  <line x1="128" y1="192" x2="212" y2="192" class="ln"/>
  <line x1="128" y1="206" x2="186" y2="206" class="ln"/>

  <!-- Texto y botón -->
  <line x1="256" y1="104" x2="350" y2="104" class="ln"/>
  <line x1="256" y1="122" x2="350" y2="122" class="ln"/>
  <line x1="256" y1="140" x2="320" y2="140" class="ln"/>
  <rect x="256" y="166" width="96" height="34" rx="17" class="fill"/>
  <line x1="278" y1="183" x2="330" y2="183" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Cursor -->
  <path d="M300 196 l0 32 l9 -9 l7 13 l7 -3 l-7 -13 l12 0 z" class="ln" fill="#fff"/>

  <!-- Soporte -->
  <line x1="170" y1="248" x2="170" y2="292" class="ln"/>
  <line x1="138" y1="292" x2="202" y2="292" class="ln"/>

  <!-- Persona -->
  <circle cx="318" cy="300" r="24" class="ln"/>
  <path d="M286 352 q32 -46 64 0" class="ln"/>
  <circle cx="310" cy="296" r="2.6" class="fill"/>
  <circle cx="326" cy="296" r="2.6" class="fill"/>
